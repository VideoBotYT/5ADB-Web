<!DOCTYPE html>
<html lang="nl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="main.css">
        <link rel="icon" href="images/Logo-ADB.jpg"type="images/x-icon">
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
        <title>Inschrijvingsformulier</title>
    </head>
    <body>
        <header> 
            <div class="topbar">
                <a class="button" href="index.html"><span class="material-symbols-outlined">home</span> Home</a>
                <a class="button" href="lessenrooster.html"><span class="material-symbols-outlined">book_2</span> Lessen</a>
                <a class="button" href="computervakken.html"><span class="material-symbols-outlined">computer</span> Computer</a>
                <a class="button" href="Inschrijving.html"><span class="material-symbols-outlined">ink_pen</span> Inschrijven</a>
            </div>
        </header>
        <h1 class="titelformulier">Inschrijvingsformulier ADB</h1>
        <div class="Form"> 
            <form 
            action="https://httpbin.org/post"
            method="post"
            enctype="multipart/form-data"
            >
                <p>
                    <label for="Voornaam">Voornaam leerling :</label>
                    <input
                    type="text"
                    name="NaamLeerling"
                    id="NaamLeerling"
                    placeholder="Voornaam"
                    autocomplete="on"
                    required
                    autofocus
                    />
                </p>
                <p>
                    <label for="Achternaam">Achternaam leerling :</label>
                    <input
                    type="text"
                    name="AchterNaamLeerling"
                    id="AchterNaamLeerling"
                    placeholder="Achternaam"
                    autocomplete="on"
                    required
                    />
                </p>
                <p>
                    <label for="Leeftijd">Leeftijd leerling :</label>
                    <input
                    type="number"
                    name="Leeftijd"
                    id="Leeftijd"
                    placeholder="Leeftijd"
                    autocomplete="on"
                    required
                    />
                </p>
                <fieldset>
                    <legend>Hoeveelste middelbaar: </legend>
                    <label for="Jaar">Jaar</label>
                    <select name="Jaar" id="Jaar">
                        <optgroup label="Jaar">
                            <option value="5de">5de</option>
                            <option value="6de">6de</option>
                        </optgroup>
                    </select>
                </fieldset>
                <p>
                    <label for="Richting">Vorige richting :</label>
                    <input
                    type="text"
                    name="Richting"
                    id="Richting"
                    placeholder="Vorige richting"
                    autocomplete="on"
                    required
                    />
                </p>
                <p>
                    <label for="school">Vorige school :</label>
                    <input
                    type="text"
                    name="school"
                    id="school"
                    placeholder="Vorige school"
                    autocomplete="on"
                    required
                    />
                </p>
                <p>
                    <label for="Adres">Adres leerling :</label>
                    <input
                    type="text"
                    name="Adres"
                    id="Adres"
                    placeholder="Adres "
                    />
                </p>
                <p>
                    <label for="beperking">Eventuele beperkingen (indien geen, niets invullen):</label>
                    <input
                    type="text"
                    name="beperking"
                    id="beperking"
                    placeholder="Beperking"
                    autocomplete="on"
                    />
                </p>
                <p>
                    <label for="VoornaamOuder1">Voornaam ouder 1 :</label>
                    <input
                    type="text"
                    name="VoornaamOuder1"
                    id="VoornaamOuder1"
                    placeholder="Voornaam ouder 1"
                    autocomplete="on"
                    required
                    />
                </p>
                <p>
                    <label for="AchternaamOuder1">Achternaam ouder 1 :</label>
                    <input
                    type="text"
                    name="AchternaamOuder1"
                    id="AchternaamOuder1"
                    placeholder="Achternaam ouder 1"
                    autocomplete="on"
                    required
                    />
                </p>
                <p>
                    <label for="VoornaamOuder2">Voornaam ouder 2 :</label>
                    <input
                    type="text"
                    name="VoornaamOuder2"
                    id="VoornaamOuder2"
                    placeholder="Voornaam ouder 2"
                    autocomplete="on"
                    />
                </p>
                <p>
                    <label for="AchternaamOuder2">Achternaam ouder 2 :</label>
                    <input
                    type="text"
                    name="AchternaamOuder2"
                    id="AchternaamOuder2"
                    placeholder="Achternaam ouder 2"
                    autocomplete="on"
                    />
                </p>
                <p>
                    <label for="Telefoonnummer">Telefoonnummer ouders :</label>
                    <input
                    type="tel"
                    name="Telefoonnummer"
                    id="Telefoonnummer"
                    placeholder="Tel: "
                    />
                </p>
                <fieldset class="Info">
                    <legend>Extra info : </legend>
                    <textarea rows="10"> </textarea>
                </fieldset>
                <br>
                <button class="submit" type="submit">Bevestigen</button>
                <button class="reset" type="reset">Reset</button>
            </form>
        </div>
        <footer>
            <p>&copy;Microsite - 5ADB - 2026</p>
        </footer>
    </body>
</html>
